    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .two-col { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1rem; }
    .upload-zone { border: 1px dashed var(--border2); padding: 2.5rem; text-align: center; color: var(--stone); font-size: 0.84rem; margin: 1rem 0; cursor: pointer; transition: all 0.2s; }
    .upload-zone:hover { border-color: var(--ink); color: var(--ink); }
    .btn-full { width: 100%; padding: 0.9rem; background: var(--ink); color: white; font-weight: 600; font-size: 0.84rem; letter-spacing: 0.06em; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.2s; margin-top: 1rem; }
    .btn-full:hover { background: var(--sienna); }
    .btn-full:disabled { opacity: 0.5; cursor: not-allowed; }
    .sidebar-card { background: var(--white); border: 1px solid var(--border); padding: 1.75rem; margin-bottom: 1rem; }
    .sidebar-h { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone); margin-bottom: 1.25rem; }
    .earn-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.86rem; color: var(--ink2); }
    .earn-row:last-child { border: none; }
    .earn-row.hl { color: var(--success); font-weight: 700; }
    .guide-ul { list-style: none; font-size: 0.82rem; color: var(--stone); display: flex; flex-direction: column; gap: 0.55rem; }
    .guide-ul li::before { content: "— "; color: var(--sienna); }

    /* ── AUTH ── */
    .auth-page { min-height: calc(100vh - 62px); display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--parchment); }
    .auth-card { background: var(--white); border: 1px solid var(--border); padding: 3rem; width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 500; color: var(--ink); margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .auth-logo-sq { width: 28px; height: 28px; border: 1.5px solid var(--ink); display: inline-flex; align-items: center; justify-content: center; font-size: 0.9rem; }
    .auth-h { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--ink); margin-bottom: 0.4rem; }
    .auth-sub { font-size: 0.84rem; color: var(--stone); margin-bottom: 2rem; line-height: 1.6; }
    .auth-divider { width: 30px; height: 1px; background: var(--sienna); margin: 0.75rem 0 2rem; }
    .auth-switch { text-align: center; margin-top: 1.5rem; font-size: 0.83rem; color: var(--stone); }
    .link-btn { color: var(--sienna); font-weight: 600; cursor: pointer; }
    .locked-box { text-align: center; background: var(--white); border: 1px solid var(--border); padding: 3.5rem 2.5rem; max-width: 440px; margin: 0 auto; }
    .locked-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--ink); margin: 0.75rem 0 0.5rem; }
    .locked-box p { color: var(--stone); margin-bottom: 2rem; font-size: 0.88rem; }
    .center-page { display: flex; align-items: center; justify-content: center; min-height: 55vh; }
    .error-banner { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 1rem 1.5rem; margin-bottom: 1.5rem; font-size: 0.84rem; line-height: 1.6; }

    /* ── CART DRAWER ── */
    .overlay { position: fixed; inset: 0; background: rgba(26,23,20,0.4); z-index: 300; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 380px; max-width: 100%; background: var(--white); z-index: 301; box-shadow: -4px 0 30px rgba(26,23,20,0.15); display: flex; flex-direction: column; border-left: 1px solid var(--border); }
    .drawer-head { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
    .drawer-head h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 500; color: var(--ink); }
    .close-x { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--stone); transition: color 0.2s; font-size: 0.9rem; }
    .close-x:hover { color: var(--ink); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .cart-item { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); font-size: 0.83rem; color: var(--stone); }
    .cart-item strong { display: block; margin-bottom: 0.2rem; color: var(--ink); font-size: 0.85rem; font-weight: 600; }
    .remove-x { color: var(--border2); font-size: 0.85rem; transition: color 0.2s; }
    .remove-x:hover { color: var(--danger); }
    .drawer-foot { padding: 1.5rem; border-top: 1px solid var(--border); }
    .cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .cart-total span { font-size: 0.8rem; color: var(--stone); letter-spacing: 0.05em; text-transform: uppercase; }
    .cart-total strong { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--ink); }
    .cart-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem; color: var(--stone); font-size: 0.88rem; text-align: center; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); max-width: calc(100vw - 2rem); color: white; padding: 0.8rem 1.75rem; font-size: 0.83rem; font-weight: 500; z-index: 500; white-space: nowrap; pointer-events: none; animation: fadeUp 0.3s ease; letter-spacing: 0.03em; border-radius: 2px; }
    @keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* ── COMMUNITY ── */
    .comm-layout { width: 100%; display: grid; grid-template-columns: 240px minmax(0,1fr); gap: 2.5rem; align-items: start; }
    .comm-sidebar { background: var(--white); border: 1px solid var(--border); overflow: hidden; position: sticky; top: 80px; }
    .comm-sidebar-title { padding: 1rem 1.25rem; font-size: 0.67rem; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--stone); border-bottom: 1px solid var(--border); }
    .comm-thread-btn { width: 100%; text-align: left; padding: 0.85rem 1.25rem; font-size: 0.84rem; color: var(--stone); border-bottom: 1px solid var(--border); transition: all 0.15s; font-weight: 500; }
    .comm-thread-btn:hover { background: var(--parchment); color: var(--ink); }
    .comm-thread-btn.active { background: var(--ink); color: white; font-weight: 600; }
    .comm-main { display: flex; flex-direction: column; gap: 1rem; }
    .comm-post { background: var(--white); border: 1px solid var(--border); padding: 1.75rem; }
    .comm-post-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .comm-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--parchment); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; overflow: hidden; flex-shrink: 0; }
    .comm-author { font-weight: 600; font-size: 0.84rem; color: var(--ink); }
    .comm-time { font-size: 0.72rem; color: var(--stone); }
    .comm-tag { font-size: 0.67rem; background: var(--parchment); color: var(--stone); padding: 0.15rem 0.55rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-left: auto; }
    .comm-body { font-size: 0.9rem; line-height: 1.7; color: var(--ink2); margin-bottom: 1rem; }
    .comm-actions { display: flex; gap: 1rem; align-items: center; }
    .comm-action-btn { font-size: 0.78rem; color: var(--stone); display: flex; align-items: center; gap: 0.3rem; transition: color 0.2s; }
    .comm-action-btn:hover { color: var(--ink); }
    .comm-replies { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.75rem; }
    .comm-reply { display: flex; gap: 0.75rem; }
    .comm-reply-body { flex: 1; background: var(--parchment); padding: 0.75rem 1rem; font-size: 0.84rem; color: var(--ink2); line-height: 1.55; }
    .comm-reply-author { font-weight: 600; color: var(--ink); font-size: 0.8rem; margin-bottom: 0.2rem; }
    .comm-compose { background: var(--white); border: 1px solid var(--border); padding: 1.75rem; }
    .comm-compose textarea { width: 100%; padding: 0.85rem 1rem; border: 1px solid var(--border); font-size: 0.88rem; resize: vertical; min-height: 90px; outline: none; font-family: inherit; background: var(--parchment); color: var(--ink); transition: border 0.2s; }
    .comm-compose textarea:focus { border-color: var(--ink); background: var(--white); }
    .comm-compose-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
    .btn-post { background: var(--ink); color: white; padding: 0.48rem 1.25rem; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; transition: background 0.2s; }
    .btn-post:hover { background: var(--sienna); }
    .btn-post:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── PROFILE TABS ── */
    .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; }
    .tab-btn { padding: 0.75rem 1.5rem; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--stone); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active-tab { color: var(--ink); border-bottom-color: var(--ink); }
    .tab-btn.gold-tab.active-tab { color: var(--sienna); border-bottom-color: var(--sienna); }

    /* ── ADMIN PANEL ── */
    .admin-wrap { width: 100%; max-width: 1320px; margin: 0 auto; padding: clamp(1rem,4vw,2.5rem); overflow-x: hidden; }
    .admin-header { background: var(--charcoal); color: white; padding: 2rem 2.5rem; }
    .admin-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; }
    .admin-header p { font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-top: 0.25rem; }
    .admin-nav { background: var(--ink); display: flex; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .admin-nav-btn { padding: 0.85rem 1.5rem; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); transition: all 0.2s; border-right: 1px solid rgba(255,255,255,0.08); }
    .admin-nav-btn:hover { color: white; background: rgba(255,255,255,0.05); }
    .admin-nav-btn.active { color: white; background: var(--sienna); }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 2.5rem; }
    .admin-stat { background: var(--white); padding: 1.75rem; text-align: center; }
    .admin-stat-val { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 600; color: var(--ink); line-height: 1; }
    .admin-stat-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stone); margin-top: 0.4rem; }
    .admin-table-wrap { background: var(--white); border: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 2rem; }
    .admin-table-head { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .admin-table-head h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 500; color: var(--ink); }
    table.admin-table { width:100%; min-width: 760px; border-collapse:collapse; font-size:0.84rem; }
    table.admin-table th { padding: 0.75rem 1rem; text-align:left; font-size:0.67rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--stone); background:var(--parchment); border-bottom:1px solid var(--border); }
    table.admin-table td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); color: var(--ink2); }
    table.admin-table tr:last-child td { border-bottom: none; }
    table.admin-table tr:hover td { background: var(--parchment); }
    .badge { display: inline-block; padding: 0.18rem 0.6rem; font-size: 0.67rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 2px; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-approved { background: #d1fae5; color: #065f46; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-banned { background: #fee2e2; color: #991b1b; }
    .admin-action-btn { font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.7rem; border: 1px solid var(--border); color: var(--ink); transition: all 0.2s; margin-right: 0.3rem; cursor: pointer; }
    .admin-action-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .admin-action-btn.danger { border-color: #fecaca; color: var(--danger); }
    .admin-action-btn.danger:hover { background: var(--danger); color: white; border-color: var(--danger); }
    .admin-action-btn.success { border-color: #a7f3d0; color: var(--success); }
    .admin-action-btn.success:hover { background: var(--success); color: white; border-color: var(--success); }
    .admin-login { min-height: calc(100vh - 62px); display: flex; align-items: center; justify-content: center; background: var(--charcoal); }
    .admin-login-card { background: var(--white); padding: 3rem; width: 100%; max-width: 380px; }
    .admin-login-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 400; margin-bottom: 0.35rem; }
    .admin-login-card p { font-size: 0.82rem; color: var(--stone); margin-bottom: 2rem; }

    /* ── FOOTER ── */
    .footer { background: var(--charcoal); color: white; }
    .footer-top { width: 100%; max-width: 1320px; margin: 0 auto; padding: 4rem 2.5rem 3rem; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 3rem; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 500; color: white; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .footer-logo-sq { width: 22px; height: 22px; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    .footer-tagline { font-size: 0.8rem; color: rgba(255,255,255,0.35); line-height: 1.65; max-width: 220px; }
    .footer-col-title { font-size: 0.65rem; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 1.25rem; font-weight: 700; }
    .footer-links-col { display: flex; flex-direction: column; gap: 0.65rem; }
    .flink { color: rgba(255,255,255,0.5); font-size: 0.83rem; text-decoration: none; transition: color 0.2s; cursor: pointer; background: none; border: none; font-family: inherit; text-align: left; }
    .flink:hover { color: rgba(255,255,255,0.85); }
    .footer-bottom { border-top: 1px solid rgba(255,255,255,0.07); width: 100%; max-width: 1320px; margin: 0 auto; padding: 1.25rem 2.5rem; display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-size: 0.74rem; color: rgba(255,255,255,0.2); }
    .footer-latin { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem; color: rgba(255,255,255,0.2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .hero { grid-template-columns: 1fr; max-height: none; }
      .hero-right { min-height: 280px; }
      .steps { grid-template-columns: repeat(2,1fr); }
      .step-card:nth-child(2) { border-right: none; }
      .step-card { border-bottom: 1px solid var(--border); }
      .step-card:nth-child(3), .step-card:nth-child(4) { border-bottom: none; }
      .testi-grid { grid-template-columns: 1fr; }
      .sell-grid { grid-template-columns: 1fr; }
      .comm-layout { grid-template-columns: 1fr; }
      .comm-sidebar { position: static; }
      .footer-top { grid-template-columns: 1fr 1fr; }
      .admin-stats { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 768px) {
      .hero-left { padding: 3rem 1.75rem; }
      .hero-h1 { font-size: 3rem; }
      .nav-links { display: none; }
      .hamburger { display: block; }
      .controls { flex-direction: column; }
      .steps { grid-template-columns: 1fr; }
      .step-card { border-right: none !important; }
      .footer-top { grid-template-columns: 1fr; }
      .admin-stats { grid-template-columns: 1fr 1fr; }
      .cta-h2 { font-size: 2.4rem; }
      .cta-strip { padding: 4rem 2rem; }
    }
    @media (max-width: 520px) {
      .drawer { width: 100%; }
      .hero-h1 { font-size: 2.4rem; }
    }


    /* ── MOBILE OVERFLOW PATCH ────────────────────────────────────────── */
    html, body, #root { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { position: relative; }
    img, video, iframe, embed, object { max-width: 100%; height: auto; }
    table { max-width: 100%; }
    .navbar, .hero, .section, .section-dark, .page-wrap, .page-hero, .footer, .admin-wrap, .admin-header, .admin-nav { width: 100%; max-width: 100%; overflow-x: hidden; }
    .nav-inner, .section, .page-wrap, .page-hero-inner, .footer-top, .footer-bottom { width: 100%; max-width: 1320px; }
    .notes-grid, .subjects-grid, .testi-grid, .steps, .admin-stats, .sell-grid, .comm-layout { min-width: 0; max-width: 100%; }
    .ncard, .scard, .testi-card, .step-card, .form-card, .sidebar-card, .comm-post, .comm-compose, .locked-box, .auth-card { min-width: 0; max-width: 100%; }
    .ntitle, .comm-body, .testi-body, .hero-h1, .hero-sub, .page-h1 { overflow-wrap: anywhere; word-break: normal; }
    .admin-table-wrap { max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.admin-table { min-width: 680px; }
    .drawer { max-width: min(100vw, 380px); }
    .preview-link { color: var(--sienna); font-weight: 600; font-size: 0.76rem; text-decoration: underline; margin-left: 0.75rem; white-space: nowrap; }
    .status-actions { display:flex; gap:0.35rem; flex-wrap:wrap; }

    .preview-modal-overlay { position: fixed; inset: 0; background: rgba(26,23,20,0.62); z-index: 650; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .preview-modal { width: min(1100px, 96vw); height: min(86vh, 820px); background: var(--white); border: 1px solid var(--border); box-shadow: var(--shadow-lg); display: flex; flex-direction: column; overflow: hidden; }
    .preview-modal-head { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--parchment); }
    .preview-modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; color: var(--ink); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preview-modal-close { flex: 0 0 auto; padding: 0.35rem 0.75rem; border: 1px solid var(--border2); color: var(--ink); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .preview-modal-close:hover { background: var(--ink); color: white; border-color: var(--ink); }
    .preview-frame { width: 100%; height: 100%; border: 0; background: white; }
    .preview-fallback { padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--stone); background: var(--white); }
    .preview-fallback a { color: var(--sienna); font-weight: 600; text-decoration: underline; }

    @media (max-width: 900px) {
      .nav-inner { padding: 0 1rem; gap: 0.6rem; }
      .nav-right { gap: 0.45rem; min-width: 0; }
      .user-chip { max-width: 44vw; overflow: hidden; gap: 0.45rem; }
      .user-chip button:first-child { max-width: 24vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cart-btn { padding: 0.36rem 0.58rem; }
      .logo { font-size: 1.25rem; flex-shrink: 0; }
      .hero { grid-template-columns: minmax(0,1fr); min-height: auto; max-height: none; }
      .hero-left { padding: 3.25rem 1.25rem; border-right: 0; }
      .hero-right { min-height: 260px; padding: 1rem; }
      .hero-stats { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1.25rem; }
      .hero-ctas, .cta-btns { width: 100%; }
      .btn-hero-primary, .btn-hero-ghost, .btn-cta-primary, .btn-cta-ghost { flex: 1 1 100%; text-align: center; }
      .section, .page-wrap { padding-left: 1rem; padding-right: 1rem; }
      .page-hero { padding-left: 1rem; padding-right: 1rem; }
      .sec-head, .admin-table-head, .footer-bottom { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .controls { flex-direction: column; width: 100%; }
      .search-box, .sel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); }
      .sel:last-child { border-bottom: none; }
      .notes-grid, .subjects-grid { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .admin-nav { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .admin-nav-btn { flex: 0 0 auto; }
    }

    @media (max-width: 520px) {
      .hero-h1 { font-size: clamp(2.25rem, 14vw, 3rem); }
      .page-h1 { font-size: 2.25rem; }
      .cta-h2 { font-size: 2.15rem; }
      .section { padding-top: 3.5rem; padding-bottom: 3.5rem; }
      .form-card, .comm-post, .comm-compose, .auth-card, .locked-box { padding: 1.25rem; }
      .upload-zone { padding: 1.5rem 1rem; }
      .admin-wrap { padding: 1rem; }
      .admin-header { padding: 1.5rem 1rem; }
      .admin-stats { grid-template-columns: 1fr; }
      .footer-top { padding: 3rem 1rem 2rem; }
      .footer-bottom { padding: 1.25rem 1rem; }

      const [sort, setSort] = useState("default");

        .filter(n => n.is_approved !== false && !n.is_deleted)

          if (subj === "all") return true;
          const entry = SUBJECTS.find(s => s.id === subj);
          return entry ? subjectMatch(n.subject, entry) : true;
        })
        .filter(n =>
          (n.title||"").toLowerCase().includes(q.toLowerCase()) ||
          (n.subject||"").toLowerCase().includes(q.toLowerCase())
        )
        .sort((a,b) =>
          sort === "price-lo" ? a.price - b.price :
          sort === "price-hi" ? b.price - a.price : 0
        );

      return (

    function SubjectPage({ subject, go, addToCart, notes, notesLoading, purchases, openPreview }) {
      if (!subject) { go("browse"); return null; }
      const filtered = notes.filter(n => n.is_approved !== false && !n.is_deleted && subjectMatch(n.subject, subject));
      return (
        <div className="page-wrap">
          <button className="back-btn" onClick={() => go("browse")}>← Back to Browse</button>
          <div className="subj-header">
            <span className="subj-icon" style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:700,color:"var(--sienna)",fontSize:"2rem"}}>{subject.icon}</span>
            <div>
              <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"2rem",fontWeight:600,color:"var(--ink)",marginBottom:"0.3rem"}}>{subject.name}</h1>
              <p style={{color:"var(--stone)",fontSize:"0.9rem"}}>{subject.desc}</p>
            </div>
          </div>
          {notesLoading
            ? <div className="notes-grid">{[1,2,3].map(i => <SkeletonCard key={i}/>)}</div>
            : filtered.length > 0
              ? <div className="notes-grid">{filtered.map(n => <NoteCard key={n.id} note={n} addToCart={addToCart} purchases={purchases} openPreview={openPreview}/>)}</div>
              : <div className="empty">No notes for this subject yet — be the first to upload.</div>
          }
        </div>
      );
    }

    // ── SELL ─────────────────────────────────────────────────────────────
    function Sell({ user, go, showToast }) {
      const [f, setF]             = useState({title:"",subject:"",price:"",pages:""});
      const [done, setDone]       = useState(false);
      const [saving, setSaving]   = useState(false);
      const [uploading, setUploading]       = useState(false);
      const [uploadedUrl, setUploadedUrl]   = useState(null);
      const [uploadedName, setUploadedName] = useState(null);
      const [previewUrl, setPreviewUrl]     = useState(null);
      const [previewName, setPreviewName]   = useState(null);
      const [previewUploading, setPreviewUploading] = useState(false);
      const set = e => setF(p => ({...p,[e.target.name]:e.target.value}));

      if (!user) return (
        <div className="page-wrap center-page">
          <div className="locked-box">
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"3rem",color:"var(--sienna)"}}>⚖</div>
            <h2>Sign In to Sell Notes</h2>
            <div style={{width:"30px",height:"1px",background:"var(--sienna)",margin:"0.75rem auto 1.25rem"}}/>
            <p>Create a free account to start earning from your study materials.</p>
            <div style={{display:"flex",gap:"1rem",justifyContent:"center",flexWrap:"wrap"}}>
              <button className="btn-cta-primary" style={{background:"var(--ink)",color:"white"}} onClick={() => go("register")}>Create Account</button>
              <button className="btn-hero-ghost" onClick={() => go("login")}>Sign In</button>
            </div>
          </div>
        </div>
      );

      if (done) return (
        <div className="page-wrap center-page">
          <div className="locked-box">
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"3rem",color:"var(--success)"}}>✓</div>
            <h2>Notes Submitted</h2>
            <div style={{width:"30px",height:"1px",background:"var(--sienna)",margin:"0.75rem auto 1.25rem"}}/>
            <p>Your notes have been submitted for admin review.</p>
            <button className="btn-full" style={{maxWidth:"240px",margin:"0 auto"}} onClick={() => { setDone(false); setF({title:"",subject:"",price:"",pages:""}); setUploadedUrl(null); setUploadedName(null); setPreviewUrl(null); setPreviewName(null); }}>Submit Another Set</button>
          </div>
        </div>
      );

      const handleUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const allowed = ["application/pdf","application/vnd.openxmlformats-officedocument.wordprocessingml.document"];
        if (!allowed.includes(file.type)) { showToast("Only PDF or DOCX files allowed.", "error"); return; }
        if (file.size > 20 * 1024 * 1024) { showToast("File too large — max 20MB.", "error"); return; }
        setUploading(true);
        const fileName = `${Date.now()}-${file.name.replace(/\s+/g,"-")}`;
        const { data, error } = await supabase.storage.from("notes-full").upload(fileName, file);
        setUploading(false);
        if (error) { showToast("Upload failed: " + error.message, "error"); return; }
        const { data: urlData } = supabase.storage.from("notes-full").getPublicUrl(data.path);
        setUploadedUrl(urlData.publicUrl);
        setUploadedName(file.name);
        showToast("File uploaded successfully.");
      };

      const handlePreviewUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const allowed = ["application/pdf","application/vnd.openxmlformats-officedocument.wordprocessingml.document"];
        if (!allowed.includes(file.type)) { showToast("Only PDF or DOCX preview files allowed.", "error"); return; }
        if (file.size > 8 * 1024 * 1024) { showToast("Preview file too large — max 8MB.", "error"); return; }
        setPreviewUploading(true);
        const fileName = `${Date.now()}-preview-${file.name.replace(/\s+/g,"-")}`;
        const { data, error } = await supabase.storage.from("notes-preview").upload(fileName, file);
        setPreviewUploading(false);
        if (error) { showToast("Preview upload failed: " + error.message, "error"); return; }
        const { data: urlData } = supabase.storage.from("notes-preview").getPublicUrl(data.path);
        setPreviewUrl(urlData.publicUrl);
        setPreviewName(file.name);
        showToast("Preview uploaded successfully.");
      };

      const submit = async () => {
        if (!f.title || !f.subject || !f.price) { showToast("Please fill all required fields.", "error"); return; }
        setSaving(true);
        const { data: { user: u } } = await supabase.auth.getUser();
        const { error } = await supabase.from("notes").insert([{
          title:     f.title,
          subject:   f.subject,
          price:     parseInt(f.price),
          pages:     f.pages ? parseInt(f.pages) : null,
          file_url:  uploadedUrl || null,
          preview_url: previewUrl || null,
          is_approved: false,
          seller_id: u?.id || null,
        }]);
        setSaving(false);
        if (error) { showToast("Save failed: " + error.message, "error"); return; }
        showToast("Notes submitted successfully.");
        setDone(true);
      };

      return (
        <>
          <div className="page-hero">
            <div className="page-hero-inner">
              <h1 className="page-h1">Sell Your Notes</h1>
              <p className="page-sub-text">Earn 80% of every sale. Our sellers average ₹4,200/month.</p>
            </div>
          </div>
          <div className="page-wrap">
            <div className="sell-grid">
              <div className="form-card">
                <div className="form-sec-title">Note Details</div>
                <label className="flabel">Title <span className="req">*</span></label>
                <input className="finput" name="title" placeholder="e.g. Complete Constitutional Law Notes" value={f.title} onChange={set}/>
                <label className="flabel">Subject <span className="req">*</span></label>
                <select className="finput" name="subject" value={f.subject} onChange={set}>
                  <option value="">Select subject</option>
                  {SUBJECTS.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                </select>
                <div className="two-col">
                  <div>
                    <label className="flabel">Price (₹) <span className="req">*</span></label>
                    <input className="finput" name="price" type="number" placeholder="199" value={f.price} onChange={set}/>
                  </div>
                  <div>
                    <label className="flabel">Pages</label>
                    <input className="finput" name="pages" type="number" placeholder="48" value={f.pages} onChange={set}/>
                  </div>
                </div>
                <label className="flabel">Upload PDF or DOCX</label>
                <div className="upload-zone" onClick={() => document.getElementById("file-input").click()}>
                  {uploading ? "Uploading…" : uploadedName ? <span style={{color:"var(--success)"}}>Uploaded: {uploadedName}</span> : "Click to select file (PDF or DOCX, max 20MB)"}
                </div>
                <input id="file-input" type="file" accept=".pdf,.docx" style={{display:"none"}} onChange={handleUpload}/>
                <label className="flabel">Upload Preview File <span style={{fontWeight:400,textTransform:"none",letterSpacing:0}}>(first 2–3 pages)</span></label>
                <div className="upload-zone" onClick={() => document.getElementById("preview-input").click()}>
                  {previewUploading ? "Uploading preview…" : previewName ? <span style={{color:"var(--success)"}}>Preview uploaded: {previewName}</span> : "Click to select preview file (PDF or DOCX, max 8MB)"}
                </div>
                <input id="preview-input" type="file" accept=".pdf,.docx" style={{display:"none"}} onChange={handlePreviewUpload}/>
                <button className="btn-full" onClick={submit} disabled={saving}>{saving?"Saving…":"Submit for Review"}</button>
              </div>
              <div>
                <div className="sidebar-card">
                  <div className="sidebar-h">Earning Structure</div>
                  <div className="earn-row"><span>Your Share</span><strong>80%</strong></div>
                  <div className="earn-row"><span>Platform Fee</span><strong>20%</strong></div>
                  <div className="earn-row hl"><span>On ₹299 note</span><strong>You earn ₹239</strong></div>
                </div>
                <div className="sidebar-card">
                  <div className="sidebar-h">Seller Guidelines</div>
                  <ul className="guide-ul">
                    <li>PDF or DOCX format, min. 10 pages</li>
                    <li>Clear handwriting or typed notes</li>
                    <li>Include subject & semester info</li>
                    <li>No copied textbook content</li>
                    <li>Review takes 24–48 hours</li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </>
      );
    }

    // ── AUTH ─────────────────────────────────────────────────────────────
    function Auth({ mode, setUser, go, showToast }) {
      const [f, setF]               = useState({name:"",email:"",password:"",college:""});
      const [loading, setLoading]   = useState(false);
      const [forgotMode, setForgot] = useState(false);
      const [forgotEmail, setForgotEmail] = useState("");
      const [forgotSent, setForgotSent]   = useState(false);
      const [forgotLoading, setFL]        = useState(false);
      const set = e => setF(p => ({...p,[e.target.name]:e.target.value}));

      const submit = async () => {
        if (!f.email || !f.password) { showToast("Please fill all fields.", "error"); return; }
        setLoading(true);
        if (mode === "register") {
          const { error } = await supabase.auth.signUp({ email: f.email, password: f.password });
          setLoading(false);
          if (error) { showToast(error.message, "error"); return; }
          showToast("Account created. Check your email to confirm, then sign in.");
          go("login");
        } else {
          const { data, error } = await supabase.auth.signInWithPassword({ email: f.email, password: f.password });
          setLoading(false);
          if (error) { showToast(error.message, "error"); return; }
          setUser(data.user.email);
          showToast("Welcome back.");
          go("home");
        }
      };

      const sendReset = async () => {
        if (!forgotEmail) { showToast("Please enter your email address.", "error"); return; }
        setFL(true);
        const { error } = await supabase.auth.resetPasswordForEmail(forgotEmail, {
          redirectTo: window.location.origin + "/?reset=true"
        });
        setFL(false);
        if (error) { showToast(error.message, "error"); return; }
        setForgotSent(true);
      };

      if (forgotMode) {
        return (
          <div className="auth-page">
            <div className="auth-card">
              <div className="auth-logo"><span className="auth-logo-sq">⚖</span>LexNotes</div>
              <h2 className="auth-h">Reset Password</h2>
              <div className="auth-divider"/>
              {forgotSent ? (
                <>
                  <div className="forgot-success">
                    Reset link sent. Check your inbox — the link expires in 1 hour. Check your spam folder if you don't see it.
                  </div>
                  <button className="btn-full" style={{marginTop:"0.5rem"}} onClick={() => { setForgot(false); setForgotSent(false); setForgotEmail(""); }}>
                    Back to Sign In
                  </button>
                </>
              ) : (
                <>
                  <p className="auth-sub">Enter your registered email and we'll send you a reset link.</p>
                  <label className="flabel">Email Address <span className="req">*</span></label>
                  <input className="finput" type="email" placeholder="you@law.edu" value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} onKeyDown={e => e.key==="Enter" && sendReset()}/>
                  <button className="btn-full" style={{marginTop:"1.75rem"}} onClick={sendReset} disabled={forgotLoading}>
                    {forgotLoading ? "Sending…" : "Send Reset Link"}
                  </button>
                  <p className="auth-switch">
                    <button className="link-btn" onClick={() => setForgot(false)}>← Back to Sign In</button>
                  </p>
                </>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="auth-page">
          <div className="auth-card">
            <div className="auth-logo"><span className="auth-logo-sq">⚖</span>LexNotes</div>
            <h2 className="auth-h">{mode==="login"?"Welcome Back":"Create Account"}</h2>
            <div className="auth-divider"/>
            <p className="auth-sub">{mode==="login"?"Sign in to access your notes and cart.":"Join 12,000+ law students on LexNotes."}</p>
            {mode==="register" && <>
              <label className="flabel">Full Name</label>
              <input className="finput" name="name" placeholder="e.g. Sahil Mehta" value={f.name} onChange={set}/>
              <label className="flabel">College</label>
              <input className="finput" name="college" placeholder="e.g. NMIMS Mumbai" value={f.college} onChange={set}/>
            </>}
            <label className="flabel">Email</label>
            <input className="finput" name="email" type="email" placeholder="you@law.edu" value={f.email} onChange={set}/>
            <label className="flabel">Password</label>
            <input className="finput" name="password" type="password" placeholder="••••••••" value={f.password} onChange={set} onKeyDown={e => e.key==="Enter" && submit()}/>
            {mode==="login" && (
              <button className="forgot-link" onClick={() => setForgot(true)}>Forgot password?</button>
            )}
            <button className="btn-full" style={{marginTop:"1.75rem"}} onClick={submit} disabled={loading}>
              {loading?"Please wait…":mode==="login"?"Sign In":"Create Account"}
            </button>
            <p className="auth-switch">
              {mode==="login"
                ? <>No account? <button className="link-btn" onClick={() => go("register")}>Sign Up</button></>
                : <>Already registered? <button className="link-btn" onClick={() => go("login")}>Sign In</button></>}
            </p>
          </div>
        </div>
      );
    }

    // ── CART DRAWER ──────────────────────────────────────────────────────

    // ── SELLER DASHBOARD ─────────────────────────────────────────────────
    function SellerDashboard({ myNotes, purchases, go, profile }) {
      const [deletingId, setDeletingId] = useState(null);
      const [notes, setNotes]           = useState(myNotes);
      useEffect(() => { setNotes(myNotes); }, [myNotes]);

      const salesByNote = {};
      purchases.forEach(p => {
        if (!salesByNote[p.note_id]) salesByNote[p.note_id] = { count: 0, revenue: 0 };
        salesByNote[p.note_id].count++;
        salesByNote[p.note_id].revenue += Number(p.amount);
      });
      const myNoteIds = new Set(notes.map(n => n.id));
      const totalSales    = Object.entries(salesByNote).filter(([id]) => myNoteIds.has(id)).reduce((s,[,v]) => s + v.count, 0);
      const totalRevenue  = Object.entries(salesByNote).filter(([id]) => myNoteIds.has(id)).reduce((s,[,v]) => s + v.revenue, 0);
      const totalEarnings = Math.floor(totalRevenue * 0.8);

      const deleteNote = async (noteId) => {
        if (!window.confirm("Delete this note? This cannot be undone.")) return;
        setDeletingId(noteId);
        const { error } = await supabase.from("notes").update({ is_deleted:true }).eq("id", noteId);
        setDeletingId(null);
        if (error) { alert("Delete failed: " + error.message); return; }
        setNotes(prev => prev.filter(n => n.id !== noteId));
      };

      return (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"1px",marginBottom:"2rem",background:"var(--border)",border:"1px solid var(--border)"}}>
            {[
              { label:"Notes Uploaded", value: notes.length },
              { label:"Total Sales",    value: totalSales },
              { label:"Total Earnings", value: `₹${totalEarnings}` },
              { label:"Avg per Note",   value: notes.length > 0 ? `₹${Math.floor(totalEarnings/notes.length)}` : "₹0" },
            ].map(s => (
              <div key={s.label} className="admin-stat">
                <div className="admin-stat-val">{s.value}</div>
                <div className="admin-stat-label">{s.label}</div>
              </div>
            ))}
          </div>
          <div className="admin-table-wrap">
            <div className="admin-table-head">
              <h3>Your Notes</h3>
              <button className="btn-gold" onClick={() => go("sell")}>Upload New</button>
            </div>
            {notes.length === 0 ? (
              <div className="empty">No notes yet.</div>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table className="admin-table">
                  <thead>
                    <tr>{["Title","Subject","Price","Sales","Your Earnings","Action"].map(h => <th key={h}>{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {notes.map(n => {
                      const sale = salesByNote[n.id] || { count:0, revenue:0 };
                      const earned = Math.floor(sale.revenue * 0.8);
                      return (
                        <tr key={n.id}>
                          <td style={{fontWeight:600,color:"var(--ink)",maxWidth:"200px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title}</td>
                          <td style={{color:"var(--stone)"}}>{n.subject}</td>
                          <td>₹{n.price}</td>
                          <td>{sale.count}</td>
                          <td style={{color:earned>0?"var(--success)":"var(--stone)"}}>₹{earned}</td>
                          <td>
                            <button className="admin-action-btn danger" onClick={() => deleteNote(n.id)} disabled={deletingId===n.id}>
                              {deletingId===n.id?"Deleting…":"Delete"}
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{borderTop:"2px solid var(--border)",background:"var(--parchment)"}}>
                      <td colSpan="4" style={{padding:"0.85rem 1rem",fontWeight:700,color:"var(--ink)"}}>Total Earnings (80% of ₹{totalRevenue})</td>
                      <td style={{padding:"0.85rem 1rem",fontWeight:700,color:"var(--success)"}}>₹{totalEarnings}</td>
                      <td/>
                    </tr>
                  </tfoot>
                </table>
              </div>
            )}
          </div>
          <div style={{background:"var(--charcoal)",padding:"1.5rem 2rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"1rem"}}>
            <div>
              <div style={{color:"white",fontWeight:600,fontSize:"1rem",marginBottom:"0.25rem"}}>Ready to earn more?</div>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:"0.84rem"}}>Upload more notes and grow your earnings.</div>
            </div>
            <button className="btn-gold" onClick={() => go("sell")}>Upload Notes</button>
          </div>
        </div>
      );
    }

    // ── PROFILE ──────────────────────────────────────────────────────────
    function Profile({ go, addToCart, notes, notesLoading, purchases, openPreview }) {
      const [profile, setProfile]           = useState(null);
      const [editing, setEditing]           = useState(false);
      const [activeTab, setActiveTab]       = useState("profile");
      const [f, setF]                       = useState({full_name:"",college:"",bio:"",year:"",programme:""});
      const [saving, setSaving]             = useState(false);
      const [avatarUploading, setAvatarUploading] = useState(false);

      useEffect(() => {
        const load = async () => {
          const { data: { user } } = await supabase.auth.getUser();
          if (!user) return;
          const { data } = await supabase.from("profiles").select("*").eq("id", user.id).single();
          setProfile(data);
          setF({ full_name: data?.full_name||"", college: data?.college||"", bio: data?.bio||"", year: data?.year||"", programme: data?.programme||"" });
        };
        load();
      }, []);

      const save = async () => {
        setSaving(true);
        const { data: { user } } = await supabase.auth.getUser();
        await supabase.from("profiles").update({ full_name: f.full_name, college: f.college, bio: f.bio, year: f.year, programme: f.programme }).eq("id", user.id);
        setProfile(p => ({...p,...f}));
        setSaving(false);
        setEditing(false);
      };

      const uploadAvatar = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setAvatarUploading(true);
        const { data: { user } } = await supabase.auth.getUser();
        const { data, error } = await supabase.storage.from("avatars").upload(`${user.id}-avatar`, file, { upsert: true });
        if (error) { setAvatarUploading(false); return; }
        const { data: urlData } = supabase.storage.from("avatars").getPublicUrl(data.path);
        await supabase.from("profiles").update({ avatar_url: urlData.publicUrl }).eq("id", user.id);
        setProfile(p => ({...p, avatar_url: urlData.publicUrl}));
        setAvatarUploading(false);
      };

      const myNotes = notes.filter(n => n.seller_id === profile?.id);
      if (!profile) return <div className="center-page"><div className="empty">Loading profile…</div></div>;

      return (
        <div className="page-wrap">
          <div className="tab-bar">
            <button className={`tab-btn ${activeTab==="profile"?"active-tab":""}`} onClick={() => setActiveTab("profile")}>My Profile</button>
            {myNotes.length > 0 && (
              <button className={`tab-btn gold-tab ${activeTab==="dashboard"?"active-tab":""}`} onClick={() => setActiveTab("dashboard")}>Seller Dashboard</button>
            )}
          </div>

          {activeTab === "profile" && (
            <>
              <div style={{background:"var(--white)",border:"1px solid var(--border)",padding:"2rem",marginBottom:"2rem",display:"flex",gap:"2rem",alignItems:"flex-start",flexWrap:"wrap"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{width:"96px",height:"96px",borderRadius:"50%",overflow:"hidden",background:"var(--parchment)",margin:"0 auto 0.75rem",border:"1px solid var(--border2)"}}>
                    {profile.avatar_url

              <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.5rem",fontWeight:500,color:"var(--ink)",marginBottom:"1.5rem"}}>My Uploaded Notes ({myNotes.length})</h2>

    // ── COMMUNITY ────────────────────────────────────────────────────────
    function Community({ user, go }) {
      const [thread, setThread]   = useState("general");
      const [posts, setPosts]     = useState([]);
      const [loading, setLoading] = useState(true);
      const [newPost, setNewPost] = useState("");
      const [posting, setPosting] = useState(false);
      const [replyTo, setReplyTo] = useState(null);
      const [replyText, setReplyText] = useState("");
      const [replies, setReplies] = useState({});
      const [profile, setProfile] = useState(null);

      useEffect(() => {
        if (user) {
          supabase.auth.getUser().then(({ data: { user: u } }) => {
            if (u) supabase.from("profiles").select("full_name,avatar_url").eq("id",u.id).single()
              .then(({ data }) => setProfile(data));
          });
        }
      }, [user]);

      useEffect(() => { loadPosts(); }, [thread]);

      const loadPosts = async () => {
        setLoading(true);
        const { data, error } = await supabase.from("posts").select("*").eq("thread_id", thread).order("created_at", { ascending: false });
        if (!error) setPosts(data || []);
        setLoading(false);
      };

      const loadReplies = async (postId) => {
        if (replies[postId]) { setReplyTo(replyTo===postId?null:postId); return; }
        const { data } = await supabase.from("replies").select("*").eq("post_id",postId).order("created_at",{ascending:true});
        setReplies(r => ({...r,[postId]:data||[]}));
        setReplyTo(replyTo===postId?null:postId);
      };

      const submitPost = async () => {
        if (!newPost.trim()) return;
        if (!user) { go("login"); return; }
        setPosting(true);
        const { data: { user: u } } = await supabase.auth.getUser();
        await supabase.from("posts").insert([{ thread_id:thread, author_id:u.id, author_name:profile?.full_name||u.email.split("@")[0], author_avatar:profile?.avatar_url||null, body:newPost.trim() }]);
        setPosting(false);
        setNewPost("");
        loadPosts();
      };

      const submitReply = async (postId) => {
        if (!replyText.trim() || !user) return;
        const { data: { user: u } } = await supabase.auth.getUser();
        await supabase.from("replies").insert([{ post_id:postId, author_id:u.id, author_name:profile?.full_name||u.email.split("@")[0], author_avatar:profile?.avatar_url||null, body:replyText.trim() }]);
        setReplyText("");
        const { data } = await supabase.from("replies").select("*").eq("post_id",postId).order("created_at",{ascending:true});
        setReplies(r => ({...r,[postId]:data||[]}));
      };

      const likePost = async (post) => {
        await supabase.from("posts").update({likes:(post.likes||0)+1}).eq("id",post.id);
        setPosts(ps => ps.map(p => p.id===post.id ? {...p,likes:(p.likes||0)+1} : p));
      };

      const activeThread = COMM_THREADS.find(t => t.id===thread);

      return (
        <>
          <div className="page-hero">
            <div className="page-hero-inner">
              <h1 className="page-h1">Community</h1>
              <p className="page-sub-text">Discuss notes, subjects, and platform feedback with fellow students</p>
            </div>
          </div>
          <div className="page-wrap">
            <div className="comm-layout">
              <div className="comm-sidebar">
                <div className="comm-sidebar-title">Threads</div>
                {COMM_THREADS.map(t => (
                  <button key={t.id} className={`comm-thread-btn ${thread===t.id?"active":""}`} onClick={() => setThread(t.id)}>
                    {t.label}
                  </button>
                ))}
              </div>
              <div className="comm-main">
                <div className="comm-compose">
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.1rem",fontWeight:500,color:"var(--ink)",marginBottom:"0.75rem"}}>{activeThread?.label}</div>
                  <textarea
                    placeholder={user ? "Share your thoughts, ask a question, or give feedback…" : "Sign in to post in this thread"}
                    value={newPost}
                    onChange={e => setNewPost(e.target.value)}
                    disabled={!user}
                  />
                  <div className="comm-compose-footer">
                    <span style={{fontSize:"0.76rem",color:"var(--stone)"}}>{newPost.length}/1000</span>
                    {user
                      ? <button className="btn-post" onClick={submitPost} disabled={posting||!newPost.trim()}>{posting?"Posting…":"Post"}</button>
                      : <button className="btn-post" onClick={() => go("login")}>Sign In to Post</button>
                    }
                  </div>
                </div>
                {loading ? (
                  [1,2,3].map(i => (
                    <div key={i} className="comm-post">
                      <div className="skel" style={{height:"10px",width:"25%",marginBottom:"0.5rem"}}/>
                      <div className="skel" style={{height:"13px",width:"85%"}}/>
                      <div className="skel" style={{height:"13px",width:"65%"}}/>
                    </div>
                  ))
                ) : posts.length === 0 ? (
                  <div className="empty" style={{background:"var(--white)",border:"1px solid var(--border)"}}>No posts yet. Be the first to post in this thread.</div>
                ) : posts.map(post => (
                  <div key={post.id} className="comm-post">
                    <div className="comm-post-header">
                      <div className="comm-avatar">
                        {post.author_avatar ? <img src={post.author_avatar} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : (post.author_name||"A")[0].toUpperCase()}
                      </div>
                      <div>
                        <div className="comm-author">{post.author_name}</div>
                        <div className="comm-time">{timeAgo(post.created_at)}</div>
                      </div>
                      <span className="comm-tag">{activeThread?.label}</span>
                    </div>
                    <div className="comm-body">{post.body}</div>
                    <div className="comm-actions">
                      <button className="comm-action-btn" onClick={() => likePost(post)}>
                        {post.likes||0} likes
                      </button>
                      <button className="comm-action-btn" onClick={() => loadReplies(post.id)}>
                        {replyTo===post.id?"Hide replies":"Reply"}{replies[post.id]?.length > 0 ? ` (${replies[post.id].length})` : ""}
                      </button>
                      {user && post.author_name === (profile?.full_name || user.split("@")[0]) && (
                        <button className="comm-action-btn" style={{color:"var(--danger)"}} onClick={async () => {
                          await supabase.from("posts").delete().eq("id", post.id);
                          setPosts(ps => ps.filter(p => p.id !== post.id));
                        }}>Delete</button>
                      )}
                    </div>
                    {replyTo===post.id && (
                      <div className="comm-replies">
                        {(replies[post.id]||[]).map(r => (
                          <div key={r.id} className="comm-reply">
                            <div className="comm-avatar" style={{width:"28px",height:"28px",fontSize:"0.8rem",flexShrink:0}}>
                              {r.author_avatar ? <img src={r.author_avatar} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : (r.author_name||"A")[0].toUpperCase()}
                            </div>
                            <div className="comm-reply-body">
                              <div className="comm-reply-author" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                <span>{r.author_name} <span style={{fontWeight:400,color:"var(--stone)",fontSize:"0.72rem"}}>{timeAgo(r.created_at)}</span></span>
                                {user && r.author_name === (profile?.full_name || user.split("@")[0]) && (
                                  <button style={{color:"var(--danger)",fontSize:"0.72rem"}} onClick={async () => {
                                    await supabase.from("replies").delete().eq("id", r.id);
                                    setReplies(prev => ({...prev, [post.id]: prev[post.id].filter(x => x.id !== r.id)}));
                                  }}>Delete</button>
                                )}
                              </div>
                              {r.body}
                            </div>
                          </div>
                        ))}
                        {user && (
                          <div style={{display:"flex",gap:"0.75rem",alignItems:"flex-start",marginTop:"0.5rem"}}>
                            <div className="comm-avatar" style={{width:"28px",height:"28px",fontSize:"0.8rem",flexShrink:0}}>
                              {profile?.avatar_url ? <img src={profile.avatar_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : (user.split("@")[0]||"A")[0].toUpperCase()}
                            </div>
                            <div style={{flex:1}}>
                              <input
                                style={{width:"100%",padding:"0.5rem 0.75rem",border:"1px solid var(--border)",fontSize:"0.84rem",outline:"none",fontFamily:"inherit",background:"var(--parchment)",color:"var(--ink)"}}
                                placeholder="Write a reply…"
                                value={replyText}
                                onChange={e => setReplyText(e.target.value)}
                                onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submitReply(post.id);}}}
                              />
                            </div>
                            <button className="btn-post" style={{flexShrink:0}} onClick={() => submitReply(post.id)} disabled={!replyText.trim()}>Reply</button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </>
      );
    }

            <p>Restricted to LexNotes editorial staff only.</p>

    function AdminPanel({ go, showToast, refreshNotes, openPreview }) {
      const [tab, setTab]         = useState("overview");
      const [notes, setNotes]     = useState([]);
      const [users, setUsers]     = useState([]);
      const [posts, setPosts]     = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => { loadAll(); }, []);

      const loadAll = async () => {
        setLoading(true);
        const [{ data: nd }, { data: ud }, { data: pd }] = await Promise.all([
          supabase.from("notes").select("*, profiles(full_name,college)").order("created_at",{ascending:false}),
          supabase.from("profiles").select("*").order("id",{ascending:false}),
          supabase.from("posts").select("*").order("created_at",{ascending:false}),
        ]);
        setNotes(nd||[]); setUsers(ud||[]); setPosts(pd||[]);
        setLoading(false);
      };

      const approveNote = async (id) => {
        const { error } = await supabase
          .from("notes")
          .update({ is_approved: true })
          .eq("id", id);

        if (error) {
          showToast("Approve failed: " + error.message, "error");
          return;
        }

        await loadAll();
        await refreshNotes?.();
        showToast("Note approved and visible publicly.");
      };

      const rejectNote = async (id) => {
        const { error } = await supabase
          .from("notes")
          .update({ is_approved: false })
          .eq("id", id);

        if (error) {

    // ── URL ROUTING HELPERS ──────────────────────────────────────────────
    const ROUTABLE_PAGES = new Set([
      "home", "browse", "sell", "sellers", "community", "privacy", "terms", "cookies",
      "login", "register", "library", "profile", "admin", "subject"
    ]);

    const PUBLIC_SITEMAP_PAGES = new Set(["home", "browse", "sell", "sellers", "community", "privacy", "terms", "cookies"]);

    function getRouteFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const requestedPage = (params.get("page") || "home").toLowerCase();
      const page = ROUTABLE_PAGES.has(requestedPage) ? requestedPage : "home";

      let ctx = {};
      if (page === "subject") {
        const subjectId = params.get("subject");
        const subject = SUBJECTS.find(s => s.id === subjectId);
        if (subject) ctx.subject = subject;
      }

      return { page, ctx };
    }

    function buildUrlForPage(page, ctx = {}) {
      if (page === "home") return window.location.pathname;

      const params = new URLSearchParams();
      params.set("page", page);

      if (page === "subject" && ctx.subject?.id) {
        params.set("subject", ctx.subject.id);
      }

      return `${window.location.pathname}?${params.toString()}`;
    }

    function App() {
      const initialRoute = getRouteFromUrl();
      const [page, setPage]           = useState(initialRoute.page);
      const [ctx,  setCtx]            = useState(initialRoute.ctx);
      const [cart, setCart]           = useState([]);
      const [cartOpen, setCartOpen]   = useState(false);
      const [user, setUser]           = useState(null);
      const [toast, setToast]         = useState(null);
      const [notes, setNotes]         = useState([]);
      const [notesLoading, setNL]     = useState(true);
      const [notesError,   setNE]     = useState(null);
      const [purchases, setPurchases] = useState([]);
      const [isAdmin, setIsAdmin]     = useState(false);
      const [adminAuthed, setAdminAuthed] = useState(false);
      const [previewModal, setPreviewModal] = useState(null);
      const [cookieConsent, setCookieConsent] = useState(() => localStorage.getItem("lexnotes-cookie-consent"));
      const [showBackTop, setShowBackTop]     = useState(false);

      useEffect(() => {
        const onScroll = () => setShowBackTop(window.scrollY > 400);
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      useEffect(() => {
        const onPopState = () => {
          const nextRoute = getRouteFromUrl();
          setPage(nextRoute.page);
          setCtx(nextRoute.ctx);
          window.scrollTo({ top: 0, behavior: "auto" });
        };
        window.addEventListener("popstate", onPopState);
        return () => window.removeEventListener("popstate", onPopState);
      }, []);

      const acceptCookies = () => { localStorage.setItem("lexnotes-cookie-consent","accepted"); setCookieConsent("accepted"); };
      const declineCookies = () => { localStorage.setItem("lexnotes-cookie-consent","declined"); setCookieConsent("declined"); };

      const fetchNotes = async () => {
        setNL(true); setNE(null);
        const { data, error } = await supabase
          .from("notes")
          .select("*, profiles(full_name, college, avatar_url)")
          .eq("is_approved", true)
          .order("created_at", { ascending: false });
        if (error) { setNE(error.message); } else { setNotes(data || []); }
        setNL(false);
      };

        if (!uid) { setPurchases([]); return; }
        const { data } = await supabase.from("purchases").select("*").eq("buyer_id", uid);
        setPurchases(data || []);
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data }) => {
          if (data.session) {
            setUser(data.session.user.email);
            setIsAdmin(data.session.user.email === ADMIN_EMAIL);
            fetchPurchases(data.session.user.id);
          }
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_, session) => {
          setUser(session ? session.user.email : null);
          setIsAdmin(session?.user?.email === ADMIN_EMAIL);
          if (session?.user?.email !== ADMIN_EMAIL) setAdminAuthed(false);
          fetchPurchases(session?.user?.id || null);
        });
        fetchNotes();
        const channel = supabase
          .channel("notes-realtime")
          .on("postgres_changes", { event:"*", schema:"public", table:"notes" }, fetchNotes)
          .subscribe();
        return () => { subscription.unsubscribe(); supabase.removeChannel(channel); };
      }, []);

      const go = (p, c = {}) => {
        const safePage = ROUTABLE_PAGES.has(p) ? p : "home";
        setPage(safePage);
        setCtx(c);

        const nextUrl = buildUrlForPage(safePage, c);
        const currentUrl = `${window.location.pathname}${window.location.search}`;
        if (nextUrl !== currentUrl) {
          window.history.pushState({ page: safePage }, "", nextUrl);
        }

        window.scrollTo({top:0,behavior:"smooth"});
      };

      const openPreview = (url, title = "Document Preview") => {
        if (!url) return;
        setPreviewModal({ url, title });
      };

      const showToast = (msg, type="success") => {
        setToast({msg,type});
        setTimeout(() => setToast(null), 3500);
      };

      const addToCart = note => {
        if (cart.find(c => c.id===note.id)) { showToast("Already in cart.", "info"); return; }
        setCart(p => [...p,note]);
        showToast(`"${(note.title||"Note").slice(0,30)}" added to cart.`);
      };

      const removeFromCart = id => setCart(p => p.filter(c => c.id!==id));

      const logout = async () => {
        await supabase.auth.signOut();
        setUser(null); setPurchases([]); setIsAdmin(false); setAdminAuthed(false);
        showToast("Signed out.");
        go("home");
      };

      const checkout = async () => {
        const { data: { user: u } } = await supabase.auth.getUser();
        if (!u) { setCartOpen(false); go("login"); return; }
        const rows = cart.map(n => ({ buyer_id:u.id, note_id:n.id, amount:n.price }));
        const { error } = await supabase.from("purchases").insert(rows);
        if (error) { showToast("Checkout failed: "+error.message,"error"); return; }
        await fetchPurchases(u.id);
        setCart([]); setCartOpen(false);
        showToast("Purchase successful. Check My Library.");
        go("library");
      };

      const np = { notes, notesLoading, notesError };

      return (
        <div>
          <Navbar page={page} go={go} cart={cart} setCartOpen={setCartOpen} user={user} logout={logout} isAdmin={isAdmin}/>
          {cartOpen && <CartDrawer cart={cart} remove={removeFromCart} close={() => setCartOpen(false)} go={go} onCheckout={checkout}/>}
          {toast    && <Toast msg={toast.msg} type={toast.type}/>} 
          <PreviewModal preview={previewModal} onClose={() => setPreviewModal(null)}/>

          {page==="home"      && <Home       go={go} addToCart={addToCart} {...np} purchases={purchases} openPreview={openPreview}/>}
          {page==="browse"    && <Browse     go={go} addToCart={addToCart} {...np} purchases={purchases} openPreview={openPreview}/>}
          {page==="subject"   && (ctx.subject
            ? <SubjectPage subject={ctx.subject} go={go} addToCart={addToCart} {...np} purchases={purchases} openPreview={openPreview}/>
            : <Browse go={go} addToCart={addToCart} {...np} purchases={purchases} openPreview={openPreview}/>
          )}
          {page==="sell"      && <Sell       user={user} go={go} showToast={showToast}/>}
          {page==="profile"   && <Profile    go={go} addToCart={addToCart} notes={notes} notesLoading={notesLoading} purchases={purchases} openPreview={openPreview}/>}
          {page==="library"   && <Library    go={go} notes={notes} purchases={purchases} addToCart={addToCart}/>}
          {page==="sellers"   && <Sellers    go={go} addToCart={addToCart} notes={notes} notesLoading={notesLoading} purchases={purchases} openPreview={openPreview}/>}
          {page==="community" && <Community  user={user} go={go}/>}
          {page==="login"     && <Auth       mode="login"    setUser={setUser} go={go} showToast={showToast}/>}
          {page==="register"  && <Auth       mode="register" setUser={setUser} go={go} showToast={showToast}/>}
          {page==="privacy"   && <PrivacyPolicy go={go}/>}
          {page==="terms"     && <TermsOfService go={go}/>}
          {page==="cookies"   && <CookiePolicy go={go}/>}
          {page==="admin"     && (adminAuthed
            ? <AdminPanel go={go} showToast={showToast} refreshNotes={fetchNotes} openPreview={openPreview}/>
            : <AdminLogin onLogin={() => setAdminAuthed(true)} showToast={showToast}/>
          )}

          {page !== "admin" && <Footer go={go}/>}

          {/* ── COOKIE BANNER ── */}
          {!cookieConsent && (
            <div className="cookie-banner">
              <p className="cookie-text">
                We use cookies to keep you signed in and, with your consent, to understand how the site is used.
                See our <button className="link-btn" style={{color:"var(--sienna2)",fontSize:"inherit"}} onClick={() => go("cookies")}>Cookie Policy</button> and <button className="link-btn" style={{color:"var(--sienna2)",fontSize:"inherit"}} onClick={() => go("privacy")}>Privacy Policy</button>.
              </p>
              <div className="cookie-btns">
                <button className="cookie-decline" onClick={declineCookies}>Decline</button>
                <button className="cookie-accept"  onClick={acceptCookies}>Accept Cookies</button>
              </div>
            </div>
          )}

          {/* ── BACK TO TOP ── */}
          <button className={`back-to-top ${showBackTop?"visible":""}`} onClick={() => window.scrollTo({top:0,behavior:"smooth"})} aria-label="Back to top">↑</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
